<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Natalia & Rafael</title>
    <style>
        :root { --accent: #25D366; --record: #ff0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; font-family: sans-serif; }
        
        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        
        #camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s linear; }
        #camera.mirrored { transform: scaleX(-1); }
        
        #editorCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 7; background: #000; display: none; }
        #canvasPreview, #videoPreview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: black; display: none; z-index: 10; }
        #molduraImagePreview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: bottom; pointer-events: none; z-index: 15; display: none; }
        #canvasFinal { display: none; }
        
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 30; display: flex; flex-direction: column; padding: 40px 20px; }
        .top-bar { display: flex; justify-content: space-between; pointer-events: auto; }
        
        .controls-bottom { 
            position: absolute;
            right: 20px;
            top: 55%;
            transform: translateY(-50%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
            pointer-events: auto; 
            container-type: inline-size;
        }

        #videoTimer { 
            background: rgba(255, 0, 0, 0.7); 
            padding: 5px 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: max(16px, 8cqi); 
            text-align: center;
            display: none; 
            margin-bottom: 10px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .btn-ui { padding: 10px 20px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 20px; color: #fff; cursor: pointer; backdrop-filter: blur(5px); }
        
        .capture-controls { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn-photo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; background: rgba(255,255,255,0.2); font-size: 24px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-gallery { width: 50px; height: 50px; border-radius: 10px; border: 1px solid #fff; background: rgba(0,0,0,0.5); font-size: 20px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }

        .btn-video { width: 70px; height: 70px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-video.recording { border-color: var(--record); background: rgba(255,0,0,0.3); }
        .stop-square { width: 25px; height: 25px; background: red; border-radius: 4px; }
        
        #editUI { display: none; pointer-events: auto; text-align: center; }
        #resultUI { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px; z-index: 40; background: rgba(0,0,0,0.85); }
        .actions-box { display: flex; flex-direction: column; gap: 15px; width: 85%; pointer-events: auto; }
        .btn-res { padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; text-align: center; text-decoration: none; color: #fff; }
        
        #startScreen { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #startBtn { padding: 25px 55px; font-size: 24px; font-weight: bold; border: none; background: #f38743; color: #fff; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="editorCanvas"></canvas>
    <canvas id="canvasPreview"></canvas> 
    <canvas id="canvasFinal"></canvas>
    <video id="videoPreview" playsinline controls loop></video>
    <img id="molduraImagePreview" src="" />

    <div class="ui-layer" id="cameraUI" style="display:none;">
        <div class="top-bar">
            <button class="btn-ui" id="switchBtn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>INVERTER</button>
            <button class="btn-ui" id="btnFlash" style="display:none;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>FLASH</button>
            <button class="btn-ui" id="btnFiltroPB" style="display:none;"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:6px;"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/></svg>P&B</button>
        </div>
        <div class="controls-bottom">
            <div id="videoTimer">00:00</div>
            <div class="capture-controls">
                <button id="galleryBtn" class="btn-gallery"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <button id="capturePhotoBtn" class="btn-photo"><svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
                <button id="captureVideoBtn" class="btn-video">
                    <svg id="camIcon" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-4v12l-6-4z"/></svg>
                    <div id="stopIcon" class="stop-square" style="display:none;"></div>
                </button>
            </div>
        </div>
    </div>

    <div class="ui-layer" id="editUI" style="justify-content: space-between; align-items: center; padding-bottom: 50px;">
        <div style="background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; text-align: center;">Ajuste sua foto (Arraste e Zoom)</div>
        <div class="actions-box" style="width: 100%; max-width: 400px;">
            <button id="toggleFrameBtn" class="btn-res" style="background:#007bff;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>COM MOLDURA</button>
            <button id="confirmEditBtn" class="btn-res" style="background:var(--accent);"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M20 6 9 17l-5-5"/></svg>CONFIRMAR</button>
            <button id="cancelEditBtn" class="btn-res" style="background:#444;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M18 6 6 18M6 6l12 12"/></svg>CANCELAR</button>
        </div>
    </div>

    <div id="resultUI">
        <div class="actions-box">
            <button id="shareBtn" class="btn-res" style="background:#fff; color:#333;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>COMPARTILHAR / SALVAR</button>
            <button id="newBtn" class="btn-res" style="background:#444;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>VOLTAR</button>
        </div>
    </div>

    <div id="startScreen"><button id="startBtn">Clique aqui para iniciar</button></div>
</div>
